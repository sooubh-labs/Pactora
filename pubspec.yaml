name: pactora
description: Never forget a promise. 100% offline commitment tracker.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^13.2.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  image_picker: ^1.1.2
  file_picker: ^8.0.7
  share_plus: ^9.0.0
  gap: ^3.0.1
  google_fonts: ^6.1.0
  flutter_slidable: ^3.1.1
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.4.2
  permission_handler: ^11.3.1
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0
  fast_contacts: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.11
  riverpod_generator: ^2.3.11
  isar_generator: ^3.1.0+1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "app-logo.png"
  web:
    generate: true
    image_path: "app-logo.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"

