name: Flutter CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Environment Info
        run: |
          echo "=== CI Debug Info ==="
          echo "GitHub SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "====================="
          git status
          flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run Analyze
        run: flutter analyze

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Prepare Release Signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/pactora.jks
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=pactora.jks" >> android/key.properties

      - name: Build Release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "Building Release APK..."
          flutter build apk --release
          echo "Release APK build finished."

      - name: Build Release App Bundle
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "Building Release App Bundle (.aab) for Play Store..."
          flutter build appbundle --release
          echo "Release App Bundle build finished."

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pactora-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload Release APK
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: pactora-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Release App Bundle
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: pactora-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
